# When a curator submits feedback (issue with CSV in body), acknowledge on the issue (no PR)
name: Curator feedback

on:
  issues:
    types: [opened]

jobs:
  # Always run so the workflow never shows "No jobs run"; process runs only for curator feedback issues
  check:
    name: Check issue
    runs-on: ubuntu-latest
    outputs:
      is_curator_feedback: ${{ steps.detect.outputs.is_curator_feedback }}
    steps:
      - name: Detect curator feedback issue
        id: detect
        run: |
          TITLE="${{ github.event.issue.title }}"
          if echo "$TITLE" | grep -qi "curator feedback"; then
            echo "is_curator_feedback=true" >> $GITHUB_OUTPUT
          else
            echo "is_curator_feedback=false" >> $GITHUB_OUTPUT
          fi

  process:
    name: Acknowledge feedback
    needs: check
    if: needs.check.outputs.is_curator_feedback == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Thank you for your feedback. The maintainer will review it in this issue.'
            });
