# Run checks on pull requests and push to main — ensure the site builds
name: CI (build & validate)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    name: Build & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Set up renv and restore R dependencies
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Render Quarto site
        run: quarto render

      - name: Verify build output
        run: |
          test -f docs/index.html || (echo "::error::docs/index.html not found after render" && exit 1)
          echo "Build output OK"
