# Run checks on pull requests and push to main — ensure the site builds
name: CI (build & validate)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/R/Library
          key: ${{ runner.os }}-r-packages-${{ hashFiles('R/*.R', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-packages-

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("DT", "jsonlite"), repos = "https://cloud.r-project.org")'

      - name: Set up Quarto
        # Use quarto-actions/setup (not deprecated setup-quarto)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Render Quarto site
        run: quarto render

      - name: Verify build output
        run: |
          test -f docs/index.html || (echo "::error::docs/index.html not found after render" && exit 1)
          echo "Build output OK"
