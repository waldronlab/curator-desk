name: Quarto render & deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      #  Force install into the SAME library Quarto uses
      - name: Install R dependencies (forced)
        run: |
          Rscript -e 'install.packages(c("rmarkdown","knitr","DT","jsonlite","dplyr"), repos="https://cloud.r-project.org", lib=Sys.getenv("R_LIBS_USER"))'

      #  Safety net (guarantee rmarkdown exists)
      - name: Verify required packages
        run: |
          Rscript -e 'if (!requireNamespace("rmarkdown", quietly=TRUE)) stop("rmarkdown still missing!")'

      #  Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      #  Render site
      - name: Render Quarto site
        env:
          GITHUB_REPO: https://github.com/${{ github.repository }}
        run: quarto render

      #  Ensure output exists
      - name: Verify build output
        run: test -f docs/index.html || (echo "::error::docs/index.html missing" && exit 1)

      #  Upload artifact
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: https://waldronlab.io/curator-desk/
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
