name: Quarto render & deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libuv1-dev

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("DT", "jsonlite", "dplyr", "rmarkdown"), repos = "https://cloud.r-project.org")'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Render Quarto site
        env:
          GITHUB_REPO: https://github.com/${{ github.repository }}
          CURATOR_DATA_PATH: ${{ vars.CURATOR_DATA_PATH || 'data/predictions.csv' }}
          CURATOR_TRIAGE_DA_ONLY: "false"
          BIOANALYZER_VERSION: ${{ vars.BIOANALYZER_VERSION || '1.0.0' }}
        run: |
          if [ ! -f "$CURATOR_DATA_PATH" ]; then
            echo "Using fallback data/sample.csv"
            export CURATOR_DATA_PATH="data/sample.csv"
          fi
          quarto render

      - name: Verify build output
        run: test -f docs/index.html || (echo "::error::docs/index.html missing" && exit 1)

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: https://waldronlab.io/curator-desk/
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
