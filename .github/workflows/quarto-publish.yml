# Render Quarto site and deploy docs/ to GitHub Pages
name: Quarto render & deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/R/Library
          key: ${{ runner.os }}-r-packages-${{ hashFiles('R/*.R', '.github/workflows/quarto-publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-packages-

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("DT", "jsonlite"), repos = "https://cloud.r-project.org")'

      - name: Set up Quarto
        # Use quarto-actions/setup (not deprecated setup-quarto)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Render Quarto site
        env:
          GITHUB_REPO: https://github.com/${{ github.repository }}
        run: quarto render

      - name: Verify build output
        run: test -f docs/index.html || (echo "::error::docs/index.html missing" && exit 1)

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: https://waldronlab.io/curator-desk/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
